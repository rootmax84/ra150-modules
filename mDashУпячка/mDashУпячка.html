    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

		#layout.active #menu {
			left: 150px;
			width: 150px;
			box-shadow: 1px 1px 4px 1px rgb(2, 2, 2, 0.2);
		}

		.card {
			box-shadow: none;
			border: 0;
			border-radius: 2em;
			background-color: #000000eb;
			color: #777;
		}

		.button-primary {
			box-shadow: none;
		}

		.pure-table td {
			transition: 0.2s color linear;
		}

		.pure-g {
			transition: all 0.5s linear;
			word-spacing: normal;
		}

		.content {
			display: contents;
			width: auto;
		}

		.header,
		.content {
			padding-left: 0 !important;
			padding-right: 0 !important;
		}

		#layout {
			position: relative;
			padding-left: 0;
			width: 100%;
			height: 100%;
		}

		#menu {
			margin-left: -150px;
			width: 150px;
			position: fixed;
			top: 0;
			bottom: 0;
			z-index: 1000;
			overflow: auto;
			-webkit-overflow-scrolling: touch;
			border-radius: 0 0 1em 0;
			box-shadow: none;
		}

		.menu-link {
			position: fixed;
			display: block;
			top: 0;
			left: 0;
			background: rgba(0, 0, 0, 0.4);
			font-size: 10px;
			width: 2em;
			height: auto;
			padding: 2.1em 1.6em;
			border-radius: 0 0 10px;
			box-sizing: content-box;
		}

		#layout,
		#menu,
			.menu-link {
			-webkit-transition: left 0.2s;
			transition: left 0.2s;
			left: 0;
		}
		#menu .pure-menu-heading {
			border-radius: 0 0 0 10px;
		}

        body {
            min-height: 100vh;
            background-color: #000 !important;
            padding: 25px 20px;
            position: relative;
            overflow-x: hidden;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
        }

        .crazy-dashboard {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 35px 30px;
            position: relative;
            z-index: 2;
			font-family: 'Courier New', 'Monaco', 'Fira Code', monospace;
        }

        .temp-group {
            background: linear-gradient(145deg, #1e1228, #09030f);
            border-radius: 120px 40px 120px 40px;
            padding: 20px 28px;
            border: 3px solid #ff44ee;
            box-shadow: 15px 15px 0px 0px #ff44aa55, -5px -5px 0px 0px #55ffaa66;
            transition: all 0.2s;
            animation: groupPulse 2s infinite alternate;
            flex: 1 1 380px;
            min-width: 280px;
        }

        @keyframes groupPulse {
            0% { box-shadow: 15px 15px 0px 0px #ff44aa55, -5px -5px 0px 0px #55ffaa66; border-color: #ff44ee; }
            100% { box-shadow: 18px 18px 0px 0px #ff88ff, -8px -8px 0px 0px #aaff88; border-color: #ffff44; }
        }

        .temp-title {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #ffaa33, #ff44ff, #33ffaa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px red;
            margin-bottom: 25px;
            letter-spacing: 6px;
            transform: skew(-8deg);
        }

        .temp-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 16px;
        }

        .temp-item {
            background: #000000aa;
            border-radius: 40px 20px 40px 20px;
            padding: 12px 16px;
            flex: 1 1 160px;
            text-align: center;
            border: 1px solid cyan;
            transition: 0.1s;
        }

        .temp-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffcc88;
            letter-spacing: 2px;
        }

        .temp-value {
            font-size: 2rem;
            font-weight: 800;
            color: #ff6600;
            text-shadow: 0 0 6px red;
            margin: 8px 0;
        }

        .temp-bar-container {
            width: 100%;
            height: 10px;
            background: #330033;
            border-radius: 20px;
            overflow: hidden;
        }

        .temp-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff8800, #ff3300);
            transition: width 0.1s ease;
        }

        .widget {
            transition: all 0.1s cubic-bezier(0.5, 1.2, 0.5, 1);
            position: relative;
        }

        .speed-ring {
            background: radial-gradient(circle at 30% 20%, #221133, #05010a);
            border-radius: 50%;
            width: 240px;
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #ff44cc;
            box-shadow: 0 0 30px #ff00aa, 12px 12px 0 #00ffcc33;
            position: relative;
        }
        .speed-value {
            font-size: 3.2rem;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 0 0 10px red;
            background: #000000aa;
            padding: 8px 18px;
            border-radius: 60px;
        }
        .needle {
            position: absolute;
            width: 6px;
            height: 85px;
            background: #ff44ff;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            transform: translateX(-50%) rotate(-45deg);
            border-radius: 10px;
            box-shadow: 0 0 8px magenta;
            transition: transform 0.25s linear;
        }

        .rpm-crazy {
            background: linear-gradient(45deg, #2a0f2a, #0f021f);
            width: 220px;
            padding: 20px 15px;
            border-radius: 80px 20px 80px 20px;
            text-align: center;
            border-left: 12px solid #ffaa00;
            transform: rotate(7deg);
        }
        .rpm-bars {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 120px;
            margin: 15px 0;
            justify-content: center;
        }
        .bar-segment {
            width: 22px;
            background: linear-gradient(to top, #ff3366, #ffff33);
            transition: height 0.07s;
            border-radius: 12px 12px 4px 4px;
        }

        .boost-box {
            background: #290f2e;
            width: 200px;
            padding: 18px;
            border-radius: 30px 60px 30px 60px;
            text-align: center;
            border: 2px dashed #ff66ff;
        }
        @keyframes shake {
            0% { transform: translate(0px, 0px); }
            100% { transform: translate(2px, -1px); }
        }
        .boost-number {
            font-size: 2.8rem;
            font-weight: bold;
            color: orange;
            padding: 6px;
        }

        .afr-wave {
            background: #0e1a1a;
            width: 240px;
            border-radius: 50px 10px 50px 10px;
            padding: 18px;
            border-bottom: 8px solid #ff00aa;
        }
        .wave {
            width: 100%;
            height: 50px;
            background: repeating-linear-gradient(90deg, lime, cyan 20px, magenta 35px);
            clip-path: polygon(0% 50%, 10% 30%, 20% 70%, 30% 40%, 40% 80%, 50% 50%, 60% 70%, 70% 30%, 80% 60%, 90% 40%, 100% 50%);
        }

        .oil-pressure {
            background: #151010;
            width: 210px;
            border-radius: 50px 50px 30px 30px;
            padding: 16px;
            position: relative;
            border-top: 14px solid #ff2222;
        }
        .mercury {
            background: #ff3366;
            height: 8px;
            border-radius: 20px;
            transition: width 0.08s;
            box-shadow: 0 0 8px orange;
        }

        .egt-fire {
            background: #2a0a0a;
            width: 210px;
            border-radius: 40px 40px 20px 20px;
            text-align: center;
            border: 2px solid #ff9900;
        }
        .flame {
            font-size: 2rem;
            filter: drop-shadow(0 0 6px orange);
            animation: fireFlicker 0.1s infinite;
        }
        @keyframes fireFlicker {
            0% { text-shadow: 0 0 2px red; opacity: 0.9; }
            100% { text-shadow: 0 0 15px orange; opacity: 1; }
        }

        .volt-zigzag {
            background: #002222;
            width: 200px;
            border-radius: 20px 60px 20px 60px;
            padding: 16px;
            border-right: 12px solid cyan;
        }

        .intake-ice {
            background: #113333;
            width: 190px;
            border-radius: 30px 30px 60px 60px;
            padding: 15px;
        }

        .ambient-weird {
            background: #2a1f1a;
            width: 200px;
            border-radius: 100px 30px 100px 30px;
            padding: 12px;
        }

        .widget-title {
            font-size: 1.6rem;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 2px 14px;
            border-radius: 30px;
            letter-spacing: 2px;
            color: #ffbb99;
        }
        .big-number {
            font-size: 2rem;
            font-weight: 800;
            margin: 10px 0;
            color: #f0f0a0;
			text-align: center;
        }
        .widget-unit {
            font-size: 1.5rem;
            color: red;
            text-align: center;
            padding-top: 5px;
			font-family: monospace;
        }

        footer {
            text-align: center;
            color: #ffffff29;
            font-size: 1.5rem;
			letter-spacing: 5px;
        }
        @media (max-width: 780px) {
            .crazy-dashboard { justify-content: center; gap: 25px; }
            .speed-ring { width: 200px; height: 200px; }
            .speed-value { font-size: 2rem; }
        }

        @keyframes chaoticSpin {
          0%, 10% {
            transform: rotate(0deg);
          }
          20%, 30% {
            transform: rotate(120deg);
          }
          40%, 50% {
            transform: rotate(-80deg);
          }
          60%, 70% {
            transform: rotate(300deg);
          }
          80%, 90% {
            transform: rotate(-200deg);
          }
          100% {
            transform: rotate(0deg);
          }
        }

        #danger {
            font-size: 55px;
            font-weight: 900;
            color: red;
            text-transform: uppercase;
            letter-spacing: 8px;
            transform-origin: center;
            animation: shake 0.08s infinite alternate;
			opacity: 0;
			position: absolute;
			background: #fff;
        }

        @keyframes shake {
            0% {
                transform: translate(0px, 0px) rotate(0deg);
            }
            25% {
                transform: translate(3px, -2px) rotate(1deg);
            }
            50% {
                transform: translate(-3px, 4px) rotate(-2deg);
            }
            75% {
                transform: translate(2px, -3px) rotate(2deg);
            }
            100% {
                transform: translate(-2px, 2px) rotate(-1deg);
            }
        }
		
		.telemetry {
			position: absolute;
			left: 40%;
			background: linear-gradient(358deg, #83419d, #0f021f);
			color: #fff;
			font-family: monospace;
			font-size: 1.5rem;
			border: 2px dashed #961911;
			padding: 5px;
			border-radius: 15px 15px 0 0;
			margin-top: -30px;
		}
    </style>

	// ---------------------------------------------------------------
    // ДАННЫЕ МЕТРИК
    // ---------------------------------------------------------------
    const tempsGroup = [
        { id: "ect", label: "ЖИЖАТЕМП", unit: "°C", min: -40, max: 150, default: 0 },
        { id: "eot", label: "МАСЛОЖАРЬ", unit: "°C", min: -40, max: 150, default: 0 },
        { id: "atf", label: "КОРОБКЕ ЧЕРТОЛЕТА", unit: "°C", min: -40, max: 150, default: 0 }
    ];

    const singleMetrics = [
        { id: "spd", label: "СКОРОСТЕ", unit: "кхм/чо?", min: 0, max: 299, default: 0, type: "int", special: "speedRing" },
        { id: "rpm", label: "ТЫЩТЫЩ", unit: "x1 пяни", min: 0, max: 10000, default: 0, type: "float", special: "rpmBars" },
        { id: "bst", label: "ТУРБОЖЕПЬ", unit: "барололо", min: -0.9, max: 3, default: 0, type: "float", special: "boostCube" },
        { id: "afr", label: "ЖОРЪ СМЕСИ", unit: "AFR", min: 0, max: 25, default: 0, type: "float", special: "afrWave" },
        { id: "eop", label: "ЖЪРЧИК ДАВИТ", unit: "bar", min: 0, max: 10, default: 0, type: "float", special: "oilPress" },
        { id: "egt", label: "ПЕРДАК", unit: "°C", min: 0, max: 1024, default: 0, type: "int", special: "egtFire" },
        { id: "vlt", label: "ЭЛЕКТРОМОЩЪ", unit: "V", min: 0, max: 15.5, default: 0, type: "float", special: "voltZig" },
        { id: "iat", label: "ВДУВЪ", unit: "°C", min: -40, max: 150, default: 0, type: "int", special: "intakeIce" },
        { id: "aat", label: "АТМОСФЕРЕ ЖЖОТЬ", unit: "°C", min: -40, max: 150, default: 0, type: "int", special: "ambientWeird" }
    ];

    let currentValues = {};

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    // ----- ОСНОВНЫЕ ФУНКЦИИ ДЛЯ РАБОТЫ С МЕТРИКАМИ -----
 
	function resetGauges() {
		if (!alarm_on) {
			return;
		} else {
			const allMetrics = [...tempsGroup, ...singleMetrics];
    
			for (let metric of allMetrics) {
				setMetric(metric.id, metric.default);
			}

			skewTemp('temp-bar-skew-ect', -40);
			skewTemp('temp-bar-skew-eot', -40);
			skewTemp('temp-bar-skew-atf', -40);
		}
	}

    // Установить значение метрики по её ID
    function setMetric(id, value) {
        // Ищем метрику в обоих массивах
        const metric = [...tempsGroup, ...singleMetrics].find(m => m.id === id);
        if (!metric) {
            console.error(`Метрика "${id}" не найдена`);
            return false;
        }
        
        // Приводим к правильному типу
        let parsedValue;
        if (metric.type === "float") {
            parsedValue = parseFloat(value);
            if (isNaN(parsedValue)) return false;
            parsedValue = parseFloat(parsedValue.toFixed(2));
		} else {
            parsedValue = parseInt(value);
            if (isNaN(parsedValue)) return false;
        }
        
        // Ограничиваем min/max
        parsedValue = clamp(parsedValue, metric.min, metric.max);
        
        // Сохраняем
        currentValues[id] = parsedValue;
        
        // Обновляем отображение
        if (tempsGroup.some(t => t.id === id)) {
            updateTempGroup();
        } else {
            updateWidget(metric);
        }
        
        return true;
    }
    
    // Получить текущее значение метрики
    function getMetric(id) {
        return currentValues[id];
    }
    
    // Получить все значения
    function getAllMetrics() {
        return { ...currentValues };
    }

    function updateTempGroup() {
        tempsGroup.forEach(t => {
            const val = currentValues[t.id];
            if (val === undefined) return;
            const percent = (val - t.min) / (t.max - t.min) * 100;
            const valSpan = document.getElementById(`temp-val-${t.id}`);
            const barSpan = document.getElementById(`temp-bar-${t.id}`);
            if (valSpan) valSpan.innerText = val;
            if (barSpan) barSpan.style.width = Math.min(100, Math.max(0, percent)) + "%";
        });
    }

    function updateWidget(metric) {
        const val = currentValues[metric.id];
        if (val === undefined) return;
        
        const percentRaw = (val - metric.min) / (metric.max - metric.min);
        const percent = Math.min(100, Math.max(0, percentRaw * 100));
        
        switch (metric.special) {
            case "speedRing":
                const needle = document.getElementById("speed-needle");
                const speedValSpan = document.getElementById("speed-val");
                if (speedValSpan) speedValSpan.innerText = val;
                if (needle) {
                    let angle = -45 + (percent / 100) * 180;
                    needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
                }
                break;
            case "rpmBars":
                for (let i = 0; i < 8; i++) {
                    const bar = document.getElementById(`rpm-bar-${i}`);
                    if (bar) {
                        let intensity = Math.min(1, Math.max(0, (percent - i * 12) / 20));
                        let height = 10 + intensity * 80;
                        bar.style.height = height + "px";
                    }
                }

	(function() {
    // Параметры масштабирования
    const MIN_SCALE = 0.5;
    const MAX_SCALE = 1.0;
    const STORAGE_KEY = 'initial_scale_preference';

    // Получаем текущий масштаб из localStorage или устанавливаем по умолчанию
    let currentScale = parseFloat(localStorage.getItem(STORAGE_KEY));
    
    if (isNaN(currentScale)) {
        currentScale = 1.0; // значение по умолчанию
    } else {
        // Ограничиваем сохраненное значение допустимыми пределами
        currentScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, currentScale));
    }

    // Применяем масштаб к viewport
    function applyScale(scale) {
        const viewport = document.querySelector('meta[name="viewport"]');
        
        if (!viewport) {
            // Создаем meta-тег viewport, если его нет
            const meta = document.createElement('meta');
            meta.name = 'viewport';
            document.head.appendChild(meta);
            updateViewportContent(meta, scale);
        } else {
            updateViewportContent(viewport, scale);
        }
        
        currentScale = scale;
        localStorage.setItem(STORAGE_KEY, scale);
    }

    function updateViewportContent(viewport, scale) {
        viewport.content = `width=device-width, initial-scale=${scale}, user-scalable=no, maximum-scale=${MAX_SCALE}, minimum-scale=${MIN_SCALE}`;
    }

    // Переменные для отслеживания жестов двумя пальцами
    let initialDistance = 0;
    let initialScaleValue = currentScale;
    let isTouching = false;

    // Вычисление расстояния между двумя пальцами
    function getDistance(touches) {
        if (touches.length < 2) return 0;
        
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    // Обработка начала касания
    function onTouchStart(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            initialDistance = getDistance(e.touches);
            initialScaleValue = currentScale;
            isTouching = true;
        }
    }

    // Обработка движения пальцев
    function onTouchMove(e) {
        if (!isTouching || e.touches.length !== 2) return;
        
        e.preventDefault();
        
        const newDistance = getDistance(e.touches);
        if (initialDistance === 0) return;
        
        // Рассчитываем соотношение изменения расстояния
        const ratio = newDistance / initialDistance;
        
        // Вычисляем новый масштаб
        let newScale = initialScaleValue * ratio;
        
        // Ограничиваем значения
        newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
        
        // Применяем масштаб в реальном времени
        applyScale(newScale);
    }

    // Завершение жеста
    function onTouchEnd(e) {
        isTouching = false;
        initialDistance = 0;
    }

    // Предотвращаем стандартное масштабирование браузера
    function preventDefaultZoom(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
        }
    }

    // Применяем сохраненный масштаб при загрузке страницы
    function init() {
        // Применяем сохраненный масштаб
        applyScale(currentScale);
        
        // Добавляем обработчики событий
        document.addEventListener('touchstart', onTouchStart, { passive: false });
        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onTouchEnd);
        document.addEventListener('touchcancel', onTouchEnd);
        
        // Дополнительная защита от зума
        document.addEventListener('gesturestart', preventDefaultZoom);
        document.addEventListener('gesturechange', preventDefaultZoom);
        document.addEventListener('gestureend', preventDefaultZoom);
    }

    // Запускаем инициализацию после загрузки DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

		delay = 1000;

		ext_cmd_stop = true;
		delay = 4000;
		return delay;
	} else if (resp != null && resp.len > 0 && resp.text.indexOf("s") !== -1) {
		delay = 500;

			clear_rbc = false;

			set("/rst 1", 0, 1);
			clear_rbc = false;
		}
	}

	if (resp != null && resp.len > 0) {
		data = resp.text.split(";").slice(1, 37);
		if (data.length === 36 && data[35] === "~") { //CRC
			
			//Watch rollback code
			calculate(data[33]);

			//Data need to be calculated
			for (let i = 0; i < data.length - 1; i++) data[i] *= 1; //Convert from string to int/float

			data[0] -= 40; //ECT
			data[1] -= 40; //EOT
			data[2] -= 40; //IAT
			data[3] -= 40; //ATF
			data[4] -= 40; //AAT
			data[5] -= 40; //EXT
			data[9] *= 2; //MAF
			data[10] = parseInt(map(data[10], 0, 147, 0, 100)); //TPS
			data[11] = cIGN(data[11]); //IGN
			data[7] ? data[12] *= 0.125 : data[12] = 0; //INJ time on RPM only
			data[14] = parseInt((data[14] * 100) / 125); //IAC
			data[15] /= 100; //AFR
			data[16] /= 200; //O2S1 Volt
			data[17] /= 200; //O2S2 Volt
			data[21] /= 100; //EOP
			data[22] /= 100; //FP

			//map/boost
			let tmp_map = data[8];
			let boost_calc = ((tmp_map - 101) / 100);
			setMetric("bst", boost_calc);

			setMetric("spd", gps_failed ? data[6] : gps_speed);

			document.getElementsByClassName('speed-ring')[0].style.animation = curr_spd > 0 ? 'chaoticSpin 30s cubic-bezier(.68,-.55,.27,1.55) infinite' : 'none';
			
			//vlt
			setMetric("vlt", data[32]);

			//ect
			setMetric("ect", data[0]);
			skewTemp('temp-bar-skew-ect', data[0]);

			//eot
			setMetric("eot", data[1]);
			skewTemp('temp-bar-skew-eot', data[1]);

			//iat

			//atf
			setMetric("atf", data[3]);
			skewTemp('temp-bar-skew-atf', data[3]);

			//aat
			setMetric("aat", data[4]);

			//ext
			//setMetric("ext", data[5]);

			setMetric("eop", data[21].toFixed(2));

			//flp
			//setMetric("flp", data[22].toFixed(2));

			//afr
			setMetric("afr", data[15].toFixed(2));

			//egt

			//rollback
			if (data[33] > 0) {

	}
	return delay;
}

function cIGN(a) {
	let tmp = ((parseInt(a) + 48) / 2 - 64);
	if (tmp == -40) tmp = 0;
	return tmp;
}

function calculate(number) {
  const events = ["knk","egt","eop","flp","eot","ect","ovb","afr","iat","map","fan","atf","aat","ext","vlt","rpm"];
  const getCode = (b, bitNumber) => (b >> bitNumber) & 0x01;
  const intNumber = parseInt(number);

  let msg = "";

  if (!intNumber || intNumber > 65535) {
    msg = "ЕБАНАТЭ ДЕТЕКТЕД!11";
  } else if (intNumber > 0) {
    events.forEach((event, index) => {
      const isError = getCode(intNumber, index) === 1;
      if (isError) {
        msg += `${event.toUpperCase()} `;
      }
    });
  }

  // Danger functionality
  if (intNumber > 0) {
    $("#danger").style.opacity = "1";
    $("#danger").textContent = `ОПАСНОСТЕ:${msg}`;
  } else {
    $("#danger").style.opacity = "0";
    $("#danger").textContent = '';
  }

  return msg;
}

  }

  if (curr_spd) {
    // Вычисляем пройденное расстояние за 1 секунду
    let distance = curr_spd / 3600; // км/ч -> км/с
    odo_curr = odo_mem + distance;

    if (odo_curr >= 9999999) {
      odo_curr = 0;
      odo_mem = 0;
      trip_exclude = 0;
    }

    // Увеличиваем счетчик
    odoSaveCounter++;

    // Сохраняем значение в localStorage каждые 10 секунд
  if (odoSaveCounter >= 10) {
    localStorage.setItem('odo', odo_curr);
    odoSaveCounter = 0;
  }

    // Обновляем odo_mem для следующей итерации
    odo_mem = odo_curr;
  } else {
    odo_curr = odo_mem;
  }

  odo_dash = odo_curr.toFixed(2);
  odo_trip = Math.abs(odo_curr - trip_exclude).toFixed(2);
}

function logger_init() {
	localStorage.removeItem("log");
	logger = "TIME ECT EOT IAT ATF AAT EXT SPD RPM MAP MAF TPS IGN INJ INJD IAC AFR O2S O2S2 EGT EOP FP ERT MHS BSTD FAN GEAR BS1 BS2 PG0 PG1 VLT RLC GLAT GLON GSPD ODO\n";
	logger_full = false;
	hideWarning();
}

const SESS_LIMIT = 100000;
const MAX_PARALLEL_UPLOADS = 5;
let IDB_SYNC_INTERVAL = 59000;
let logsRestored = false;
let restoringLogs = false;
let isSavingToDB = false;
let longOffline = false;
let lastProcessTime = 0; // Время последнего вызова processLogs
let lastIDBSyncTime = 0;
let datapoints = 0;
let isProcessing = false; // Защита от параллельной обработки
let session_queued = false;
let idb_empty = true;
let session_stop_triggered = false; // Обновляем сессию в оффлайне каждую секунду после истечения таймаута сессии

function logs_handler() {
    const currentTime = Date.now();

    // IndexedDB: инициализация и операции
    const dbName = 'TelemetryQueueDB';
    const storeName = 'logs';

    function openDB(callback) {
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { autoIncrement: true });
            }
        };

        request.onsuccess = (event) => callback(event.target.result);
    }

    function clearLogsFromDB(callback) {
        openDB((db) => {
            const tx = db.transaction([storeName], 'readwrite');
            const store = tx.objectStore(storeName);
            const req = store.clear();
            req.onsuccess = () => callback && callback();
        });
    }

    function saveLogsToDB(logs) {
        if (!logs || !logs.length) return;

        const chunkSize = 10000;
        let index = 0;

        function writeNextChunk() {
            openDB((db) => {
                const tx = db.transaction([storeName], 'readwrite');
                const store = tx.objectStore(storeName);
                const chunk = logs.slice(index, index + chunkSize);
                chunk.forEach((log) => store.add(log));
                tx.oncomplete = () => {
                    index += chunkSize;
                    if (index < logs.length) {
                        setTimeout(writeNextChunk, 100);
                    } else {
                        idb_empty = false;
                    }
                };
            });
        }

        writeNextChunk();
    }

    function getLogsFromDB(callback) {
        openDB((db) => {
            const tx = db.transaction([storeName], 'readonly');
            const store = tx.objectStore(storeName);
            const logs = [];
            store.openCursor().onsuccess = (event) => {
                const cursor = event.target.result;
                if (cursor) {
                    logs.push(cursor.value);
                    cursor.continue();
                } else {
                    idb_empty = logs.length === 0;
                    callback(logs);
                }
            };
        });
    }

    function deleteFirstNFromDB(n, callback) {
        if (idb_empty) return callback && callback(0);
        openDB((db) => {
            const tx = db.transaction([storeName], 'readwrite');
            const store = tx.objectStore(storeName);
            let count = 0;
            store.openCursor().onsuccess = (event) => {
                const cursor = event.target.result;
                if (cursor && count < n) {
                    store.delete(cursor.primaryKey);
                    count++;
                    cursor.continue();
                } else {
                    if (callback) callback(count);
                }
            };
        });
    }

    // Оффлайн переход
    if (alarm_on) {
        if (!isSavingToDB && t_log.length > map(freq, 100, 1000, 100, 10)) {
            isSavingToDB = true;
            const toSave = [...t_log];
            t_log = [];
            clearLogsFromDB(() => {
                saveLogsToDB(toSave);
                isSavingToDB = false;
            });
        }
        logsRestored = false;  // Reset the flag to allow restoration later
        restoringLogs = false;
        session_queued = false;
        let expirationTime = last_session + (session_stop * 60 * 1000);
        if (currentTime > expirationTime || datapoints >= SESS_LIMIT) {
            session_start = false; // Start new session request
            session = currentTime; // New session id
            localStorage.setItem("last_session_time", session);
            localStorage.setItem("last_session_datapoints", 0);
            last_session = session;
            session_stop_triggered = true;
        }
        if (session_stop_triggered) {
            session = currentTime;
        }
    }

    // Онлайн переход (восстановление)
    else if (!logsRestored && !restoringLogs) {
        restoringLogs = true;
        getLogsFromDB((logs) => {
            if (logs.length > 0) {
                t_log = logs.concat(t_log);
            }
            logsRestored = true;
            restoringLogs = false;
        });
    }

    // Проверка условий на выгрузку
    try {
        if (!loaded || gauges_error || alarm_on || data[35] !== "~" || ext_cmd_stop) {
            lastIDBSyncTime = currentTime;
            setTimeout(logs_handler, 1000);
            return;
        } else session_stop_triggered = false;
    } catch (e) {
        lastIDBSyncTime = currentTime;
        setTimeout(logs_handler, 1000);
        return;
    }

    // Local storage logs
    if (t_settings[13] === "enabled") {
        try {
            let storage_left = parseInt(map(logger.length, 0, 5000000, 0, 100));
            if (storage_left < 100) {
                logger += [
                    currentTime, data[0], data[1], data[2], data[3], data[4], data[5], data[6],
                    data[7], data[8], data[9], data[10], data[11], data[12], data[13], data[14],
                    data[15], data[16], data[17], data[20], data[21], data[22], data[23],
                    parseInt(data[24] / 60), data[25], data[26], data[27], data[28],
                    data[29], data[30], data[31], data[32], data[33], gps_lat, gps_long,
                    gps_speed, odo_dash
                ].join(" ") + "\n";
                wr_freq++;
                if (wr_freq >= map((1000/freq), 1, 20, 10, 200)) {
                    localStorage.setItem("log", logger); //Store log in local storage 5mb limit
                    wr_freq = 0;
                }
            } else {
                if (!logger_full) {
                    localStorage.setItem("log", logger);
                    logger_full = true;
                }
                showWarning(localization.key['dash.logger.full']);
            }
        } catch (e) {
            logger_init();
        }
    }

    // Telemetry upload
    if (t_settings[0] === "enabled" && t_settings[1].length > 0) {
        const normalInterval = freq; // Интервал freq мс
        const errorInterval = 10000; // Интервал 10 сек

        // Проверяем, есть ли реально SESSION_START в очереди
        const hasCurrentSessionStart = t_log.some(l =>
            l.startsWith("SESSION_START:") && l.includes(`session=${session}`)
        );

        // Если флаг говорит "в очереди", а по факту его нет — чиним состояние
        if (!session_start && session_queued && !hasCurrentSessionStart) {
            session_queued = false;
        }

        // Если сессия ещё не подтверждена на сервере и ещё не помещена в очередь — ставим её в очередь
        if (!session_start && !session_queued) {
            const start_request = `session=${session}&time=${session}&lang=${lang}&profileName=${t_settings[2] || 'RedManage'}`;
            t_log.push("SESSION_START:" + start_request);
            session_queued = true; // отмечаем, что запрос уже в очереди (но НЕ подтверждён)
            localStorage.setItem("last_session_time", session);
            last_session = session;
        }

        const request = [
            "session=", session, "&id=RedManage&time=", currentTime, "&lang=", lang,
            "&kff1202=", ((data[8] - 101) / 100),
            "&k5=", data[0], "&k5c=", data[1], "&kf=", data[2],
            "&kb4=", data[3], "&k46=", data[4], "&k2101=", data[5],
            "&kd=", data[6], "&kc=", data[7], "&kb=", data[8],
            "&k10=", data[9], "&k11=", data[10], "&ke=", data[11],
            "&k2112=", data[12], "&k2100=", data[13], "&k2113=", data[14],
            "&k21cc=", data[15], "&kff1214=", data[16], "&kff1218=", data[17],
            "&k78=", data[20], "&k2111=", data[21], "&k2119=", data[22],
            "&k1f=", data[23], "&k2118=", parseInt(data[24] / 60),
            "&k2120=", data[25], "&k2122=", data[26], "&k2124=", data[27],
            "&k21e1=", data[28], "&k21e2=", data[29], "&k2125=", data[30],
            "&k2126=", data[31], "&kff1238=", data[32], "&k21fa=", data[33],
            "&kff1006=", gps_lat, "&kff1005=", gps_long, "&kff1001=", gps_speed,
            "&kff1204=", odo_trip, "&kff120c=", odo_dash
        ].join("");

        t_log.push(request); // Collect logs in array if connection to telemetry is lost

        // Лимит лога 1млн датапоинтов
        if (t_log.length > 1000000) {
          t_log.shift(); // Удаляем старые записи
        }

        xhr_timeout = t_log.length > 10 ? 60000 : 5000; // Change xhr timeout when we have a queue

        const uploadLog = (log) => {
            return new Promise((resolve, reject) => {
                const payload = log.startsWith("SESSION_START:") ? log.replace("SESSION_START:", "") : log;
                ajaxReq("POST", t_settings[1],
                    (resp) => {
                        if (resp !== "OK!") {
                            telemetry_error = true;
                            showWarning(resp, 5000);
                            reject(new Error("Upload failed: " + resp));
                        } else {
                            telemetry_error = false;
                            longOffline = false;
                            resolve({ isSessionStart: log.startsWith("SESSION_START:") });
                        }
                    },
                    (s, st) => {
                        telemetry_error = true;
						$("#tel").textContent = "СЛИВ ПОКАЗАНИЙ ПЕРДОЛЕТА: НЕГОДУЕ!1";
                        longOffline = true;
                        reject(new Error("Upload error"));
                    },
                    payload,
                    t_settings[3]
                );
            });
        };

        const processLogs = async () => {
            if (isProcessing) return;
            isProcessing = true;
            try {
                while (t_log.length) {
                    const batch = t_log.slice(0, telemetry_error ? 1 : MAX_PARALLEL_UPLOADS);
                    const results = await Promise.allSettled(batch.map(uploadLog));
                    let processedCount = 0;

                    for (const res of results) {
                        if (res.status === "fulfilled") {
                            processedCount++;
                            const isSessionStart = res.value.isSessionStart;
                            if (isSessionStart) {
                                session_start = true;
                                session_queued = false;
                                datapoints = 0;
                                showNotification(localization.key['dash.tel.start']);
                            } else {
                                datapoints++;
                                if (datapoints >= SESS_LIMIT) {
                                    session_start = false;
                                    session = currentTime;
                                }
                            }
                        } else {
                            // Ошибка — прерываем, чтобы не терять очередь
                            telemetry_error = true;
                            break;
                        }
                    }

                    // Удаляем успешно обработанные логи
                    if (processedCount > 0) {
                        t_log.splice(0, processedCount);
                        if (!idb_empty) deleteFirstNFromDB(processedCount);
                    }

                    // Если была ошибка — выходим, не продолжаем дальше
                    if (telemetry_error) break;

                    if (t_log.length > 5) {
                        showAttention(localization.key['dash.tel.queue'] + t_log.length);
						$("#tel").textContent = "СЛИВ ПОКАЗАНИЙ ПЕРДОЛЕТА: ПАДАЖЖЫ...";
                    }
                }
            } finally {
                isProcessing = false;
            }
        };

        // Управление частотой вызова processLogs
        const currentInterval = telemetry_error ? errorInterval : normalInterval;
        if (currentTime - lastProcessTime >= currentInterval) {
            processLogs();
            lastProcessTime = currentTime;
        }
    }

	$("#tel").style.color = telemetry_error ? "red" : (t_log.length > 10 ? "darkorange" : "springgreen");
	if (t_log.length <= 1 && !telemetry_error) $("#tel").textContent = "СЛИВ ПОКАЗАНИЙ ПЕРДОЛЕТА: РАБОТАЕ!1";

    // Автосинхронизация очереди в IndexedDB
    if (currentTime - lastIDBSyncTime >= IDB_SYNC_INTERVAL) {
        lastIDBSyncTime = currentTime;
        localStorage.setItem("last_session_datapoints", datapoints);
        if (t_log.length > 10 && !isProcessing && !isSavingToDB) {
            IDB_SYNC_INTERVAL = 59000;
            isSavingToDB = true;
            const toSave = [...t_log];
            clearLogsFromDB(() => {
                saveLogsToDB(toSave);
                isSavingToDB = false;
            });
        } else {
            IDB_SYNC_INTERVAL = 3000;
        }
    }

    // Планирование следующего вызова
    setTimeout(
        logs_handler,
        t_settings[0] === "enabled" ? (session_start ? freq : longOffline ? freq : 2500) : freq
    );
}

class RPMBlink {
  static start() {
    if (RPMBlink.active) return;
    RPMBlink.active = true;
    RPMBlink.el = $('#rpm-bars-container');
    if (!RPMBlink.el) return;
    
    RPMBlink.el.style.animation = 'none';
    
    if (!RPMBlink.active) return;
		RPMBlink.el.style.animation = 'shake 0.3s infinite alternate';
  }
  
  static stop() {
    RPMBlink.active = false;
    if (RPMBlink.el) RPMBlink.el.style.animation = 'none';
  }
}
